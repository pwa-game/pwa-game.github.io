name: Deploy Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: cards/package-lock.json

      - name: Install cards dependencies
        working-directory: cards
        run: npm ci

      - name: Test cards
        working-directory: cards
        run: npm test

      - name: Build cards
        working-directory: cards
        run: npm run build

      - name: Assemble site
        run: |
          rm -rf _site
          mkdir -p _site/games
          cp -R hub/. _site/
          cp -R games/. _site/games/
          rm -rf _site/games/cards
          mkdir -p _site/games/cards
          cp -R cards/dist/. _site/games/cards/
          find _site -name '.DS_Store' -delete

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
