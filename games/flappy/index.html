<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
    <meta name="theme-color" content="#0d2632" />
    <meta name="description" content="Flappy Bird PWA，点击或按空格飞过管道，支持离线游玩。" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Flappy" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="apple-touch-icon" href="../../icons/apple-touch-icon.png" />
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="stylesheet" href="../shared/arcade.css" />
    <link rel="stylesheet" href="styles.css" />
    <title>Flappy Bird</title>
  </head>
  <body>
    <main class="game-shell game-flappy">
      <header class="game-header">
        <a class="back-link" href="../../" aria-label="返回游戏大厅">‹</a>
        <div class="game-title">
          <h1>Flappy Bird</h1>
          <p>点击起飞，穿过管道。</p>
        </div>
        <div class="header-actions">
          <button class="tool-button" type="button" id="pause">暂停</button>
          <button class="tool-button primary" type="button" id="new-game">新局</button>
        </div>
      </header>

      <section class="stat-row" aria-label="分数">
        <div class="stat"><span>分数</span><strong id="score">0</strong></div>
        <div class="stat"><span>最高</span><strong id="best">0</strong></div>
        <div class="stat"><span>状态</span><strong id="state">准备</strong></div>
      </section>

      <section class="game-stage">
        <canvas class="panel" id="board" width="360" height="540" aria-label="Flappy Bird 游戏画面"></canvas>
        <button class="start-overlay" type="button" id="start">点击开始</button>
        <div class="overlay hidden" id="overlay">
          <strong id="overlay-title">暂停</strong>
          <span id="overlay-text">按继续回到游戏。</span>
          <div class="overlay-actions">
            <button class="tool-button primary" type="button" id="resume">继续</button>
            <button class="tool-button" type="button" id="overlay-new">新局</button>
          </div>
        </div>
      </section>

      <footer class="game-footer">
        <div class="message" id="message">点击画面、按钮或按空格让小鸟上升。</div>
      </footer>
    </main>
    <script src="game.js"></script>
    <script src="../shared/fullscreen-shell.js"></script>
    <script>
      if ('serviceWorker' in navigator) window.addEventListener('load', () => navigator.serviceWorker.register('sw.js'));
    </script>
  </body>
</html>
