<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
    <meta name="theme-color" content="#1c2530" />
    <meta name="description" content="扫雷 PWA，支持难度切换、插旗模式、长按插旗和离线游玩。" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="扫雷" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="apple-touch-icon" href="../../icons/apple-touch-icon.png" />
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="stylesheet" href="../shared/arcade.css" />
    <link rel="stylesheet" href="styles.css" />
    <title>扫雷</title>
  </head>
  <body>
    <main class="game-shell game-mines">
      <header class="game-header">
        <a class="back-link" href="../../" aria-label="返回游戏大厅">‹</a>
        <div class="game-title">
          <h1>扫雷</h1>
          <p>点开安全格，标出全部雷。</p>
        </div>
        <div class="header-actions">
          <button class="tool-button" type="button" id="pause">暂停</button>
          <button class="tool-button" type="button" id="flag-mode">插旗</button>
          <button class="tool-button primary" type="button" id="new-game">新局</button>
        </div>
      </header>

      <section class="stat-row" aria-label="状态">
        <div class="stat"><span>雷</span><strong id="mines">10</strong></div>
        <div class="stat"><span>旗</span><strong id="flags">0</strong></div>
        <div class="stat"><span>时间</span><strong id="time">0</strong></div>
      </section>

      <section class="mode-row" aria-label="难度">
        <button class="mode-button active" type="button" data-level="easy">初级</button>
        <button class="mode-button" type="button" data-level="medium">中级</button>
        <button class="mode-button" type="button" data-level="hard">高级</button>
      </section>

      <section class="game-stage">
        <div class="mine-board panel" id="board" aria-label="扫雷棋盘"></div>
        <div class="overlay hidden" id="overlay">
          <strong id="overlay-title">暂停</strong>
          <span id="overlay-text">按继续回到游戏。</span>
          <div class="overlay-actions">
            <button class="tool-button primary" type="button" id="resume">继续</button>
            <button class="tool-button" type="button" id="overlay-new">新局</button>
          </div>
        </div>
      </section>

      <footer class="game-footer">
        <div class="message" id="message">首次点击一定安全。手机可长按插旗。</div>
      </footer>
    </main>
    <script src="game.js"></script>
    <script src="../shared/fullscreen-shell.js"></script>
    <script>
      if ('serviceWorker' in navigator) window.addEventListener('load', () => navigator.serviceWorker.register('sw.js'));
    </script>
  </body>
</html>
