<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
    <meta name="theme-color" content="#101827" />
    <meta name="description" content="俄罗斯方块 PWA，支持键盘、触摸按钮、下一个方块和离线游玩。" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="俄罗斯方块" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="apple-touch-icon" href="../../icons/apple-touch-icon.png" />
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="stylesheet" href="../shared/arcade.css" />
    <link rel="stylesheet" href="styles.css" />
    <title>俄罗斯方块</title>
  </head>
  <body>
    <main class="game-shell game-tetris">
      <header class="game-header">
        <a class="back-link" href="../../" aria-label="返回游戏大厅">‹</a>
        <div class="game-title">
          <h1>俄罗斯方块</h1>
          <p>滑动移动，点按旋转，下滑硬降。</p>
        </div>
        <div class="header-actions">
          <button class="tool-button" type="button" id="pause">暂停</button>
          <button class="tool-button primary" type="button" id="new-game">新局</button>
        </div>
      </header>

      <section class="stat-row" aria-label="分数">
        <div class="stat"><span>分数</span><strong id="score">0</strong></div>
        <div class="stat"><span>行数</span><strong id="lines">0</strong></div>
        <div class="stat"><span>等级</span><strong id="level">1</strong></div>
        <div class="stat"><span>下一个</span><canvas id="next" width="84" height="64" aria-label="下一个方块"></canvas></div>
      </section>

      <section class="game-stage tetris-stage">
        <canvas class="panel" id="board" width="240" height="480" aria-label="俄罗斯方块棋盘"></canvas>
        <div class="overlay hidden" id="overlay">
          <strong id="overlay-title">暂停</strong>
          <span id="overlay-text">按继续回到游戏。</span>
          <div class="overlay-actions">
            <button class="tool-button primary" type="button" id="resume">继续</button>
            <button class="tool-button" type="button" id="overlay-new">新局</button>
          </div>
        </div>
      </section>

      <footer class="game-footer">
        <div class="wide-controls" aria-label="控制">
          <button class="control-button" type="button" data-action="left">←</button>
          <button class="control-button" type="button" data-action="rotate">旋转</button>
          <button class="control-button" type="button" data-action="right">→</button>
          <button class="control-button" type="button" data-action="soft">软降</button>
          <button class="control-button primary" type="button" data-action="drop">硬降</button>
        </div>
        <div class="message" id="message">画布手势：左右滑移动，点按或上滑旋转，下滑硬降。</div>
      </footer>
    </main>
    <script src="game.js"></script>
    <script src="../shared/fullscreen-shell.js"></script>
    <script>
      if ('serviceWorker' in navigator) window.addEventListener('load', () => navigator.serviceWorker.register('sw.js'));
    </script>
  </body>
</html>
